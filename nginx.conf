server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = / {
        return 302 /colorseek/;
    }

    location /colorseek/ {
        try_files $uri $uri/ /colorseek/index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
